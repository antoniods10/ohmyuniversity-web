<div class="mt-8 rounded-xl border border-blue-100 bg-blue-50 p-5">
  <!-- Domanda -->
  <p class="text-sm font-medium text-gray-800">
    {{ question().text }}
    @if (question().required) {
      <span class="ml-1 text-blue-500">*</span>
    }
  </p>

  <!-- single-select / yes-no-maybe -->
  @if (isSingleSelect()) {
    <div class="mt-3 flex flex-wrap gap-2">
      @for (option of question().options; track option.value) {
        <button
          type="button"
          (click)="select(option.value)"
          [class]="
            isSelected(option.value)
              ? 'inline-flex items-center rounded-full border border-blue-500 bg-blue-500 px-4 py-1.5 text-sm font-medium text-white transition-all'
              : 'inline-flex items-center rounded-full border border-gray-200 bg-white px-4 py-1.5 text-sm font-medium text-gray-700 transition-all hover:border-blue-300 hover:bg-blue-50'
          ">
          {{ option.label }}
        </button>
      }
    </div>
  }

  <!-- yes-no -->
  @if (isYesNo()) {
    <div class="mt-3 flex gap-2">
      <button
        type="button"
        (click)="select('si')"
        [class]="
          isSelected('si')
            ? 'inline-flex items-center rounded-full border border-blue-500 bg-blue-500 px-5 py-1.5 text-sm font-medium text-white transition-all'
            : 'inline-flex items-center rounded-full border border-gray-200 bg-white px-5 py-1.5 text-sm font-medium text-gray-700 transition-all hover:border-blue-300 hover:bg-blue-50'
        ">
        Sì
      </button>
      <button
        type="button"
        (click)="select('no')"
        [class]="
          isSelected('no')
            ? 'inline-flex items-center rounded-full border border-blue-500 bg-blue-500 px-5 py-1.5 text-sm font-medium text-white transition-all'
            : 'inline-flex items-center rounded-full border border-gray-200 bg-white px-5 py-1.5 text-sm font-medium text-gray-700 transition-all hover:border-blue-300 hover:bg-blue-50'
        ">
        No
      </button>
    </div>
  }

  <!-- scale -->
  @if (isScale()) {
    <div class="mt-3 space-y-2">
      @for (option of scaleOptions(); track option.value) {
        <button
          type="button"
          (click)="select(option.value)"
          [class]="
            isSelected(option.value)
              ? 'flex w-full items-center gap-3 rounded-lg border border-blue-500 bg-blue-500 px-4 py-2.5 text-left transition-all'
              : 'flex w-full items-center gap-3 rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-left transition-all hover:border-blue-300 hover:bg-blue-50'
          ">
          <!-- Numero scala -->
          <span
            [class]="
              isSelected(option.value)
                ? 'flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white text-xs font-semibold text-blue-500'
                : 'flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-gray-100 text-xs font-semibold text-gray-500'
            ">
            {{ option.value }}
          </span>
          <!-- Label -->
          <span
            [class]="
              isSelected(option.value) ? 'text-sm font-medium text-white' : 'text-sm text-gray-700'
            ">
            {{ option.label }}
          </span>
        </button>
      }
    </div>
  }

  <!-- Feedback risposta data -->
  @if (selectedValue()) {
    <div class="mt-3 flex items-center gap-1.5">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4 text-blue-500"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      <span class="text-xs text-blue-600">Risposta salvata</span>
    </div>
  }
</div>
