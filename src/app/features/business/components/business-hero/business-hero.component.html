<section class="bg-white px-4 pt-16 pb-12 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-3xl text-center">
    <app-custom-badge [label]="badge()" variant="info" shape="pill" size="sm" />
    <h1 appText class="mt-4 text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">
      {{ title() }}
    </h1>
    <p appText class="mx-auto mt-4 max-w-2xl leading-relaxed text-gray-500">
      {{ subtitle() }}
    </p>
  </div>
</section>
