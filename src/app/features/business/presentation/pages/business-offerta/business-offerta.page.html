<app-business-hero
  title="Cosa offriamo alle aziende"
  [subtitle]="
    APP_NAME +
    ' mette la tua organizzazione davanti agli studenti universitari italiani nel momento in cui sono più attenti e motivati. Niente scatter marketing - solo connessioni reali.'
  " />

<!-- What we offer -->
<section class="bg-white px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 items-stretch">
      @for (offer of offers; track offer.title) {
        <app-card-simple
          [icon]="offer.icon"
          [title]="offer.title"
          [body]="offer.description"
          variant="primary"
          padding="md"
          shadow="sm"
          [stretchHeight]="true" />
      }
    </div>
  </div>
</section>

<!-- Why OhMyUniversity! -->
<section class="border-t border-gray-100 bg-gray-50 px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <h2 appText class="text-center text-2xl font-bold text-gray-900">
      Perché {{ APP_NAME }} è diverso dagli altri
    </h2>
    <p appText class="mx-auto mt-3 max-w-xl text-center text-sm text-gray-500">
      Esistono decine di portali per il recruiting universitario. Ecco cosa ci distingue.
    </p>
    <div class="mt-10 flex flex-col gap-5">
      @for (d of differentiators; track d.title) {
        <app-card-status
          [icon]="d.icon"
          statusVariant="info"
          [title]="d.title"
          [description]="d.description"
          padding="lg"
          shadow="none" />
      }
    </div>
  </div>
</section>

<!-- Numbers -->
<section class="bg-white px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <h2 appText class="text-center text-2xl font-bold text-gray-900">
      La nostra audience in numeri
    </h2>
    <div class="mt-10 grid grid-cols-2 gap-6 sm:grid-cols-4">
      <app-card-stat
        value="120k+"
        label="Studenti attivi"
        variant="default"
        padding="sm"
        shadow="none"
        [bordered]="false" />
      <app-card-stat
        value="50+"
        label="Atenei italiani"
        variant="default"
        padding="sm"
        shadow="none"
        [bordered]="false" />
      <app-card-stat
        value="4.8"
        suffix="★"
        label="Rating medio app"
        variant="default"
        padding="sm"
        shadow="none"
        [bordered]="false" />
      <app-card-stat
        value="78"
        suffix="%"
        label="Utenti attivi settimanali"
        variant="default"
        padding="sm"
        shadow="none"
        [bordered]="false" />
    </div>
  </div>
</section>

<app-business-cta
  [title]="'Porta la tua azienda su ' + APP_NAME"
  subtitle="Inizia con 14 giorni di prova gratuita. Nessuna carta di credito, nessun impegno."
  primaryLabel="Inizia la prova gratuita"
  primaryLink="/business/registrazione"
  secondaryLabel="Vedi i piani"
  secondaryLink="/business/prezzi" />
