<section class="border-t border-gray-100 bg-blue-600 px-4 py-16 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl text-center">
    @if (badge()) {
      <app-custom-badge
        [label]="badge()!"
        variant="info"
        shape="pill"
        size="sm"
        class="bg-white! text-blue-700!" />
      <div class="mt-4"></div>
    }
    <h2 appText class="text-2xl font-bold text-white">{{ title() }}</h2>
    <p appText class="mt-3 text-sm leading-relaxed text-blue-100">{{ subtitle() }}</p>
    <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
      <app-custom-button
        [label]="primaryLabel()"
        mode="link-internal"
        [href]="primaryLink()"
        variant="outline"
        size="md"
        class="[&_.btn]:bg-white! [&_.btn]:text-blue-600! [&_.btn]:border-none!" />
      <app-custom-button
        [label]="secondaryLabel()"
        mode="link-internal"
        [href]="secondaryLink()"
        variant="outline"
        size="md"
        class="[&_.btn]:border-blue-400! [&_.btn]:text-white! [&_.btn]:bg-transparent!" />
    </div>
  </div>
</section>
