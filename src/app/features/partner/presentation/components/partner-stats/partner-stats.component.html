<section class="border-y border-gray-100 bg-gray-50 px-4 py-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl grid grid-cols-2 gap-6 lg:grid-cols-4">
    @for (stat of stats(); track stat.label) {
      <app-card-stat
        [value]="stat.value"
        [label]="stat.label"
        variant="default"
        padding="sm"
        shadow="none"
        [bordered]="false" />
    }
  </div>
</section>
