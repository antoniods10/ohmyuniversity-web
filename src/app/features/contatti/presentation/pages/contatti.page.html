<section class="bg-white px-4 pt-16 pb-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl text-center">
    <span
      class="inline-block rounded-full border border-blue-200 bg-blue-50 px-4 py-1 text-xs font-medium text-blue-700">
      Contattaci
    </span>
    <h1 class="mt-4 text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">
      Come possiamo aiutarti?
    </h1>
    <p class="mx-auto mt-4 max-w-lg text-gray-500">
      Seleziona chi sei - il modulo si adatterà alle tue esigenze specifiche. Rispondiamo sempre
      entro 2 giorni lavorativi.
    </p>
  </div>
</section>

<section class="px-4 pb-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl">
    <div class="mb-8 flex rounded-xl border border-gray-200 bg-gray-50 p-1">
      <button
        type="button"
        (click)="setTab('academic')"
        class="flex flex-1 items-center justify-center gap-2 rounded-lg py-2.5 text-sm font-medium transition"
        [class.bg-white]="activeTab() === 'academic'"
        [class.shadow-sm]="activeTab() === 'academic'"
        [class.text-gray-900]="activeTab() === 'academic'"
        [class.text-gray-500]="activeTab() !== 'academic'">
        <span>🎓</span>
        Sono un universitario
      </button>
      <button
        type="button"
        (click)="setTab('organization')"
        class="flex flex-1 items-center justify-center gap-2 rounded-lg py-2.5 text-sm font-medium transition"
        [class.bg-white]="activeTab() === 'organization'"
        [class.shadow-sm]="activeTab() === 'organization'"
        [class.text-gray-900]="activeTab() === 'organization'"
        [class.text-gray-500]="activeTab() !== 'organization'">
        <span>🏢</span>
        Sono un'organizzazione
      </button>
    </div>

    @if (activeTab() === 'academic') {
      <app-contatti-form-academic />
    }

    @if (activeTab() === 'organization') {
      <app-contatti-form-organization />
    }
  </div>
</section>
