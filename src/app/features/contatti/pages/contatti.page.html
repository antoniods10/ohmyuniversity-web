<!-- Hero -->
<section class="bg-white px-4 pt-16 pb-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl text-center">
    <app-custom-badge label="Contattaci" variant="primary" shape="pill" size="sm" />

    <div class="mt-4">
      <h1 appText variant="h1" align="center">Come possiamo aiutarti?</h1>
    </div>

    <div class="mt-4">
      <p appText variant="body-lg" color="muted" align="center" class="mx-auto max-w-lg">
        Seleziona chi sei - il modulo si adatterà alle tue esigenze specifiche. Rispondiamo sempre
        entro 2 giorni lavorativi.
      </p>
    </div>
  </div>
</section>

<!-- Tab selector + form -->
<section class="px-4 pb-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl">
    <div class="mb-8">
      <app-custom-tabs
        [tabs]="tabs"
        [activeTab]="activeTab()"
        tabStyle="pill"
        variant="primary"
        [fullWidth]="true"
        (tabChange)="setTab($event)" />
    </div>

    @if (activeTab() === 'academic') {
      <app-contatti-form-academic />
    }

    @if (activeTab() === 'organization') {
      <app-contatti-form-organization />
    }
  </div>
</section>
