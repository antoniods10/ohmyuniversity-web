<div class="mt-8 space-y-3">
  <div class="flex gap-3">
    <app-custom-button
      label="Arg. Prec."
      variant="ghost"
      size="sm"
      [icon]="iconPrev"
      iconPosition="left"
      [disabled]="!hasPrev()"
      [fullWidth]="true"
      (clicked)="prev.emit()" />
    <app-custom-button
      label="Arg. Succ."
      variant="ghost"
      size="sm"
      [icon]="iconNext"
      iconPosition="right"
      [disabled]="!hasNext()"
      [fullWidth]="true"
      (clicked)="next.emit()" />
  </div>
  <app-custom-button
    label="← Torna ad Orientamento"
    variant="flat"
    size="sm"
    [fullWidth]="true"
    (clicked)="backToList.emit()" />
</div>
