<section class="border-t border-gray-100 bg-gray-50 px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <div class="text-center">
      <h2 appText variant="h2" align="center">Il team</h2>
      <p appText variant="body-lg" color="muted" align="center" class="mt-3">
        Quattro persone con un obiettivo comune: rendere la vita universitaria meno frustrante.
      </p>
    </div>

    <div class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (member of teamMembers; track member.name + member.role) {
        <app-card-team
          [member]="{ name: member.name, role: member.role, avatarSrc: member.avatarSrc ?? '' }"
          [description]="member.bio"
          shadow="sm"
          [hoverable]="true"
          [stretchHeight]="true" />
      }
    </div>
  </div>
</section>
