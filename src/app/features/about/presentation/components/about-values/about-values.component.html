<section class="bg-white px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <h2 appText variant="h2" align="center">I nostri valori</h2>

    <div class="mt-10 grid gap-6 sm:grid-cols-3">
      @for (value of values; track value.title) {
        <app-card-simple
          [icon]="value.icon"
          [variant]="value.variant ?? 'primary'"
          [title]="value.title"
          [body]="value.description"
          shadow="none"
          [bordered]="false"
          [stretchHeight]="true" />
      }
    </div>
  </div>
</section>
