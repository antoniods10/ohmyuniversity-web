<section class="bg-white px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <h2 class="text-center text-2xl font-bold text-gray-900">I nostri valori</h2>
    <div class="mt-10 grid gap-8 sm:grid-cols-3">
      @for (value of values; track value.title) {
        <div>
          <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-blue-50">
            <svg
              class="h-5 w-5 text-blue-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="value.icon" />
            </svg>
          </div>
          <h3 class="mt-4 font-semibold text-gray-900">{{ value.title }}</h3>
          <p class="mt-2 text-sm leading-relaxed text-gray-500">{{ value.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
