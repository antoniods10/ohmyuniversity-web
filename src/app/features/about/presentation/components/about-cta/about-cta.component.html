<section class="bg-sky-50 px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl text-center">
    <h2 appText variant="h2" align="center">Vuoi contribuire?</h2>

    <div class="mt-4">
      <p appText variant="body-lg" color="muted" align="center">
        {{ APP_NAME }} è aperto a contributi di ogni tipo: codice, design, documentazione,
        segnalazioni di bug o semplicemente feedback sul prodotto. Ogni contributo conta.
      </p>
    </div>

    <div class="mt-8 flex flex-col items-center justify-center gap-4 sm:flex-row">
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Contribuisci su GitHub"
          variant="primary"
          mode="link-external"
          href="https://github.com/ohmyopensource"
          target="_blank"
          size="md"
          [fullWidth]="true" />
      </div>
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Usa il prodotto"
          variant="ghost"
          mode="link-internal"
          href="/login"
          size="md"
          [fullWidth]="true" />
      </div>
    </div>
  </div>
</section>
