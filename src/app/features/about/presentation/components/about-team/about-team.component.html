<section class="border-t border-gray-100 bg-gray-50 px-4 py-14 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-900">Il team</h2>
      <p class="mt-3 text-gray-500">
        Sei persone con un obiettivo comune: rendere la vita universitaria meno frustrante.
      </p>
    </div>
    <div class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (member of teamMembers; track member.name + member.role) {
        <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
          <div class="flex items-center gap-4">
            <div
              class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-blue-600 text-sm font-semibold text-white">
              {{ member.initials }}
            </div>
            <div>
              <p class="font-semibold text-gray-900">{{ member.name }}</p>
              <p class="text-xs text-gray-400">{{ member.role }}</p>
            </div>
          </div>
          <p class="mt-4 text-sm leading-relaxed text-gray-500">{{ member.bio }}</p>
        </div>
      }
    </div>
  </div>
</section>
