<div class="mx-auto max-w-3xl px-4 pb-16 sm:px-6 lg:px-8">
  @for (category of categories(); track category.title; let catIndex = $index) {
    <div class="mt-10">
      <!-- Category Title -->
      <span appText variant="overline" color="primary" class="mb-4 block">
        {{ category.title }}
      </span>

      <!-- Items accordion -->
      <div class="space-y-2">
        @for (item of category.items; track item.question; let itemIndex = $index) {
          <div class="overflow-hidden rounded-xl border border-gray-200 bg-white">
            <button
              type="button"
              (click)="toggle(catIndex, itemIndex)"
              class="flex w-full items-center justify-between px-5 py-4 text-left transition hover:bg-gray-50"
              [attr.aria-expanded]="isOpen(catIndex, itemIndex)">
              <span appText variant="body" weight="semibold" color="default">
                {{ item.question }}
              </span>
              <span
                class="ml-3 shrink-0 text-gray-400 transition-transform duration-200"
                [class.rotate-180]="isOpen(catIndex, itemIndex)">
                <svg [lucideIcon]="iconChevron" [size]="16" aria-hidden="true"></svg>
              </span>
            </button>

            @if (isOpen(catIndex, itemIndex)) {
              <div class="border-t border-gray-100 px-5 py-4">
                <p appText variant="body-sm" color="muted">{{ item.answer }}</p>
              </div>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
