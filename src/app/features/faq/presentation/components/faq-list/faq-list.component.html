<div class="mx-auto max-w-3xl px-4 pb-16 sm:px-6 lg:px-8">
  @for (category of categories(); track category.title; let catIndex = $index) {
    <div class="mt-10">
      <!-- Titolo categoria -->
      <h2 class="mb-4 text-sm font-semibold uppercase tracking-wider text-blue-600">
        {{ category.title }}
      </h2>

      <!-- Items accordion -->
      <div class="space-y-2">
        @for (item of category.items; track item.question; let itemIndex = $index) {
          <div class="rounded-xl border border-gray-200 bg-white overflow-hidden">
            <button
              type="button"
              (click)="toggle(catIndex, itemIndex)"
              class="flex w-full items-center justify-between px-5 py-4 text-left transition hover:bg-gray-50"
              [attr.aria-expanded]="isOpen(catIndex, itemIndex)">
              <span class="text-sm font-medium text-gray-900">{{ item.question }}</span>
              <svg
                class="h-4 w-4 shrink-0 text-gray-400 transition-transform duration-200"
                [class.rotate-180]="isOpen(catIndex, itemIndex)"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
              </svg>
            </button>

            @if (isOpen(catIndex, itemIndex)) {
              <div class="border-t border-gray-100 px-5 py-4">
                <p class="text-sm leading-relaxed text-gray-500">{{ item.answer }}</p>
              </div>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
