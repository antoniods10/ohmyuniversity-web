<section class="bg-white px-4 pt-16 pb-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-3xl text-center">
    @if (badge()) {
      <app-custom-badge [label]="badge()" variant="primary" shape="pill" size="sm" />
    }

    <div class="mt-4">
      <h1 appText variant="h1" align="center">{{ title() }}</h1>
    </div>

    <div class="mt-4">
      <p appText variant="body-lg" color="muted" align="center" class="mx-auto max-w-xl">
        {{ subtitle() }}
      </p>
    </div>
  </div>
</section>
