<app-faq-hero
  title="Domande frequenti"
  subtitle="Trova le risposte alle domande più comuni su OhMyUniversity: accesso, dati, privacy e supporto."
  badge="FAQ" />

<app-faq-list [categories]="categories" />

<!-- CTA Contact -->
<div class="border-t border-gray-100 bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-xl text-center">
    <p appText variant="body" weight="semibold" align="center">
      Non hai trovato la risposta che cercavi?
    </p>
    <div class="mt-1">
      <p appText variant="body-sm" color="muted" align="center">
        Scrivici a
        <a href="mailto:hello@ohmyuniversity.it" class="text-blue-600 hover:underline">
          hello@ohmyuniversity.it
        </a>
        oppure apri una issue su GitHub.
      </p>
    </div>
  </div>
</div>
