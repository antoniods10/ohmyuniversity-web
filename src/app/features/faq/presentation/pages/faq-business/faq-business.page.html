<app-faq-hero
  title="FAQ - Per le organizzazioni"
  subtitle="Tutto quello che aziende e collettivi studenteschi devono sapere per iniziare a usare OhMyUniversity."
  badge="Business" />

<app-faq-list [categories]="categories" />

<!-- CTA Commercial Contact -->
<div class="border-t border-gray-100 bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-xl text-center">
    <p appText variant="body" weight="semibold" align="center">
      Hai domande specifiche sulla tua organizzazione?
    </p>
    <div class="mt-1">
      <p appText variant="body-sm" color="muted" align="center">
        Il nostro team commerciale è disponibile per una chiamata conoscitiva gratuita.
      </p>
    </div>

    <div class="mt-5 flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Contatta il team commerciale"
          variant="primary"
          mode="link-external"
          href="mailto:business@ohmyuniversity.it"
          size="sm"
          [fullWidth]="true" />
      </div>
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Vedi i piani"
          variant="ghost"
          mode="link-internal"
          href="/business/prezzi"
          size="sm"
          [fullWidth]="true" />
      </div>
    </div>
  </div>
</div>
