<header
  class="flex items-center justify-between h-13 px-5 shrink-0 z-5"
  style="background: white; border-bottom: 1px solid var(--color-neutral-200)">
  <!-- Left — @TODO: breadcrumb / page title -->
  <div class="flex items-center gap-2 flex-1">
    <!-- @TODO -->
  </div>

  <!-- Right — actions -->
  <div class="flex items-center gap-1">
    <!-- Notifiche -->
    <div class="relative">
      <app-custom-button
        variant="ghost"
        size="sm"
        [iconOnly]="true"
        [icon]="iconBell"
        [attr.aria-label]="notificationCount + ' notifiche non lette'" />

      @if (notificationCount > 0) {
        <span class="absolute top-0.5 right-0.5 pointer-events-none">
          <app-custom-badge [count]="notificationCount" variant="error" size="xs" shape="pill" />
        </span>
      }
    </div>
  </div>
</header>
