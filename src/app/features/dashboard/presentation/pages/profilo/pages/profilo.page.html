<app-dashboard-container>
  <app-dashboard-header
    title="Profilo"
    description="Le tue informazioni personali e di sicurezza." />

  @if (loading()) {
    <div class="flex justify-center py-16">
      <span class="text-sm" style="color: var(--color-neutral-400)"> Caricamento profilo... </span>
    </div>
  } @else if (error()) {
    <app-card-status
      statusVariant="error"
      [icon]="lucideAlertTriangle"
      title="Errore nel caricamento"
      description="Impossibile recuperare il profilo. Riprova più tardi." />
  } @else if (profilo()) {
    <app-profile-hero [profilo]="profilo()!" />

    <div class="flex justify-start mt-2 mb-2">
      <app-custom-tabs
        [tabs]="tabs()"
        [activeTab]="activeTab()"
        tabStyle="pill"
        size="md"
        (tabChange)="onTabChange($event)" />
    </div>

    @if (activeTab() === 'informazioni') {
      <app-profile-information [profilo]="profilo()!" />
    }

    @if (activeTab() === 'corso' && hasCarriera && carrieraInfo()) {
      <app-profile-course [info]="carrieraInfo()!" />
    }

    @if (activeTab() === 'sicurezza') {
      <app-profile-security />
    }
  }
</app-dashboard-container>
