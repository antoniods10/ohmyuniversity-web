<app-card-status
  statusVariant="warning"
  [icon]="lucideAlertTriangle"
  title="Pagina in sviluppo"
  description="Questa pagina è visibile a scopo dimostrativo ma non fa parte della release corrente dello sprint." />

<app-dashboard-container>
  <app-dashboard-header
    title="Segreteria"
    description="Borse di studio, modulistica, bandi e situazione tasse in un unico posto." />

  <app-custom-tabs
    [tabs]="tabs"
    [activeTab]="activeTab()"
    tabStyle="pill"
    size="md"
    (tabChange)="onTabChange($event)" />

  @if (activeTab() !== 'fees') {
    <app-custom-input
      [placeholder]="
        activeTab() === 'scholarships'
          ? 'Cerca borse di studio...'
          : activeTab() === 'forms'
            ? 'Cerca moduli per nome o categoria...'
            : 'Cerca bandi e concorsi...'
      "
      [iconLeft]="iconSearch"
      size="sm"
      [fullWidth]="true"
      [clearable]="true"
      (inputChange)="onSearchChange($event)" />
  }

  @if (activeTab() === 'scholarships') {
    <app-scholarships-tab
      [scholarships]="filteredScholarships()"
      (apply)="onApplyScholarship($event)" />
  }

  @if (activeTab() === 'forms') {
    <app-forms-tab [forms]="filteredForms()" />
  }

  @if (activeTab() === 'bandi') {
    <app-bandi-tab [bandi]="filteredBandi()" />
  }

  @if (activeTab() === 'fees') {
    <app-fees-tab
      [tasse]="tasse()"
      [loading]="tasseLoading()"
      [error]="tasseError()"
      [hasCarriera]="hasCarriera" />
  }
</app-dashboard-container>
