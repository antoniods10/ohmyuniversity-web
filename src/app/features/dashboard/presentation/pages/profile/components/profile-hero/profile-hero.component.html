<app-custom-card variant="default" padding="none" shadow="sm" [bordered]="true" radius="lg">
  <!-- Banner -->
  <div
    class="h-24 w-full rounded-t-[16px]"
    style="
      background: linear-gradient(135deg, var(--color-primary-light), var(--color-secondary-light));
    "></div>

  <div class="px-6 pb-6">
    <!-- Avatar -->
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 -mt-10 mb-4">
      <div class="relative w-fit">
        <app-custom-avatar
          [src]="fotoUrl()"
          [name]="nomeCompleto"
          size="lg"
          shape="circle"
          variant="primary"
          [showRing]="true"
          ringSize="lg"
          [ringGap]="true"
          [clickable]="false" />
      </div>
    </div>

    <!-- Nome + info -->
    <div class="flex flex-col gap-1">
      <h1 appText variant="h4" class="m-0">{{ nomeCompleto }}</h1>
      <p appText variant="body-sm" color="muted" class="m-0">
        {{ profilo().emailAte }}
      </p>
    </div>

    <!-- Quick info -->
    <div
      class="flex flex-wrap gap-4 mt-4 pt-4"
      style="border-top: 1px solid var(--color-neutral-200)">
      <div class="flex items-center gap-1.5">
        <svg
          [lucideIcon]="iconMail"
          [size]="13"
          style="color: var(--color-neutral-400)"
          aria-hidden="true"></svg>
        <span class="text-[0.78rem]" style="color: var(--color-neutral-500)">
          {{ profilo().email }}
        </span>
      </div>
      @if (profilo().cellulare) {
        <div class="flex items-center gap-1.5">
          <svg
            [lucideIcon]="iconPhone"
            [size]="13"
            style="color: var(--color-neutral-400)"
            aria-hidden="true"></svg>
          <span class="text-[0.78rem]" style="color: var(--color-neutral-500)">
            {{ profilo().cellulare }}
          </span>
        </div>
      }
      @if (profilo().comuneResidenza) {
        <div class="flex items-center gap-1.5">
          <svg
            [lucideIcon]="iconMapPin"
            [size]="13"
            style="color: var(--color-neutral-400)"
            aria-hidden="true"></svg>
          <span class="text-[0.78rem]" style="color: var(--color-neutral-500)">
            {{ profilo().comuneResidenza }}
          </span>
        </div>
      }
    </div>
  </div>
</app-custom-card>
