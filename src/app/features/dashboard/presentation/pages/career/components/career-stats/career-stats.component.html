<app-custom-card padding="lg" shadow="sm" radius="md">
  <div class="flex flex-wrap items-end justify-between gap-2">
    <div>
      <p appText class="text-xs font-semibold uppercase tracking-wide text-gray-400">
        Avanzamento percorso
      </p>
      <div class="mt-1 flex items-baseline gap-1.5">
        <span class="text-3xl font-bold text-gray-900">{{ earnedCfu() }}</span>
        <span class="text-sm text-gray-400">/ {{ totalCfu() }} CFU</span>
      </div>
    </div>
    <app-custom-badge [label]="cfuProgress() + '%'" variant="warning" shape="pill" size="md" />
  </div>

  <div class="mt-4 h-3 w-full overflow-hidden rounded-full bg-gray-100">
    <div
      class="h-full rounded-full bg-gradient-to-r from-amber-400 to-amber-600 transition-all duration-700 ease-out"
      [style.width.%]="cfuProgress()"></div>
  </div>
</app-custom-card>

<section class="mt-4 grid grid-cols-1 gap-3 sm:gap-4 sm:grid-cols-3">
  <app-card-stat
    [icon]="iconCalculator"
    [value]="arithmeticAverage().toString()"
    suffix="/ 30"
    label="Media aritmetica"
    variant="info"
    padding="md"
    shadow="sm" />

  <app-card-stat
    [icon]="iconScale"
    [value]="weightedAverage().toString()"
    suffix="/ 30"
    label="Media ponderata"
    variant="secondary"
    padding="md"
    shadow="sm" />

  <app-card-stat
    [icon]="iconGraduation"
    [value]="graduationBase().toString()"
    suffix="/ 110"
    label="Base di laurea"
    variant="success"
    padding="md"
    shadow="sm" />
</section>

<div class="mt-4">
  <app-card-status
    statusVariant="info"
    description="La media ponderata considera i CFU di ogni esame; la base di laurea è (media ponderata / 30) × 110."
    padding="md"
    shadow="none" />
</div>
