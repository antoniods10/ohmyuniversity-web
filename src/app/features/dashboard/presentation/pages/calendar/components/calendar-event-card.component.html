<app-custom-card
  [variant]="variant()"
  padding="none"
  shadow="sm"
  radius="lg"
  [bordered]="false"
  [clickable]="true"
  (cardClick)="onCardClick()">
  <div
    class="flex items-center gap-3"
    [class.px-3]="compact()"
    [class.py-2]="compact()"
    [class.px-4]="!compact()"
    [class.py-3]="!compact()">
    <div
      class="flex shrink-0 items-center justify-center rounded-xl"
      [class]="iconBgClass()"
      [class.h-8]="compact()"
      [class.w-8]="compact()"
      [class.h-9]="!compact()"
      [class.w-9]="!compact()">
      <svg
        [lucideIcon]="icon()"
        [size]="compact() ? 16 : 18"
        [class]="iconColorClass()"
        aria-hidden="true"></svg>
    </div>

    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-semibold" [class]="titleColorClass()">
        {{ event().title }}
      </p>
      <p class="mt-0.5 truncate text-xs text-gray-500">
        {{ timeRange() }}
      </p>
    </div>

    @if (durationLabel()) {
      <app-custom-badge [label]="durationLabel()" [variant]="variant()" shape="pill" size="sm" />
    }
  </div>
</app-custom-card>
