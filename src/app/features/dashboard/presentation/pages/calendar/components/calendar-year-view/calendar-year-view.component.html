<div class="grid grid-cols-2 gap-4 sm:grid-cols-3">
  @for (month of months(); track month.date.getTime()) {
    <button
      type="button"
      class="rounded-xl p-2 text-left transition-colors hover:bg-gray-50"
      (click)="onMonthClick(month.date)">
      <p appText variant="h6" weight="extrabold" color="primary" class="mb-2 uppercase">
        {{ month.label }}
      </p>

      <div class="grid grid-cols-7 grid-rows-6 gap-0.5">
        @for (day of month.days; track day.date.getTime()) {
          @if (day.isInMonth) {
            <div class="flex flex-col items-center gap-0.5 py-0.5">
              <p
                appText
                variant="caption"
                [weight]="day.isToday ? 'extrabold' : 'semibold'"
                [color]="day.isToday ? 'error' : day.isWeekend ? 'subtle' : 'muted'">
                {{ day.date.getDate() }}
              </p>
              <span
                class="h-1 w-1 rounded-full"
                [class.bg-red-500]="day.dotVariant === 'error'"
                [class.bg-purple-500]="day.dotVariant === 'secondary'"
                [class.bg-amber-500]="day.dotVariant === 'warning'"
                [class.bg-transparent]="!day.dotVariant"></span>
            </div>
          } @else {
            <div></div>
          }
        }
      </div>
    </button>
  }
</div>
