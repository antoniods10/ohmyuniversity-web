<app-custom-modal
  [type]="modalType"
  size="md"
  [title]="isEditing() ? 'Modifica voce' : 'Nuova voce'"
  (closed)="onCancel()">
  <div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <app-custom-input
        type="select"
        label="Tipo"
        [options]="typeOptions"
        [ngModel]="activeFormType()"
        (ngModelChange)="onTypeChange($event)" />

      <app-custom-input
        label="Giorno"
        placeholder="22/06/2026"
        [required]="true"
        [errorMessage]="dateErrorMessage()"
        [ngModel]="eventDate()"
        (ngModelChange)="onDateInput($event)" />
    </div>

    <app-custom-input
      label="Titolo"
      placeholder="Es. Esame Basi di Dati"
      [required]="true"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)" />

    <app-custom-input
      type="textarea"
      label="Descrizione"
      placeholder="Aggiungi una nota"
      [rows]="3"
      [ngModel]="description()"
      (ngModelChange)="description.set($event)" />

    <div class="grid grid-cols-2 gap-3">
      <div class="relative">
        <app-custom-input
          label="Ora inizio"
          placeholder="09:00"
          [required]="true"
          [errorMessage]="timeErrorMessage()"
          [ngModel]="startTime()"
          (ngModelChange)="onTimeInput($event)" />
        <div
          class="absolute right-1 top-7 flex flex-col overflow-hidden rounded-md border border-gray-200 bg-white">
          <button
            type="button"
            class="flex h-4 w-6 items-center justify-center hover:bg-gray-50"
            aria-label="Aumenta ora inizio"
            (click)="onStartTimeStep(1)">
            <svg [lucideIcon]="iconChevronUp" [size]="11" aria-hidden="true"></svg>
          </button>
          <button
            type="button"
            class="flex h-4 w-6 items-center justify-center border-t border-gray-200 hover:bg-gray-50"
            aria-label="Diminuisci ora inizio"
            (click)="onStartTimeStep(-1)">
            <svg [lucideIcon]="iconChevronDown" [size]="11" aria-hidden="true"></svg>
          </button>
        </div>
      </div>

      <div class="relative">
        <app-custom-input
          label="Ora fine"
          placeholder="10:00"
          [required]="true"
          [errorMessage]="endTimeErrorMessage()"
          [ngModel]="endTime()"
          (ngModelChange)="onEndTimeInput($event)" />
        <div
          class="absolute right-1 top-7 flex flex-col overflow-hidden rounded-md border border-gray-200 bg-white">
          <button
            type="button"
            class="flex h-4 w-6 items-center justify-center hover:bg-gray-50"
            aria-label="Aumenta ora fine"
            (click)="onEndTimeStep(1)">
            <svg [lucideIcon]="iconChevronUp" [size]="11" aria-hidden="true"></svg>
          </button>
          <button
            type="button"
            class="flex h-4 w-6 items-center justify-center border-t border-gray-200 hover:bg-gray-50"
            aria-label="Diminuisci ora fine"
            (click)="onEndTimeStep(-1)">
            <svg [lucideIcon]="iconChevronDown" [size]="11" aria-hidden="true"></svg>
          </button>
        </div>
      </div>
    </div>

    @if (durationLabel()) {
      <p appText variant="caption" color="subtle">Durata: {{ durationLabel() }}</p>
    }

    <app-custom-input
      label="Luogo"
      placeholder="Es. Aula 5"
      [ngModel]="location()"
      (ngModelChange)="location.set($event)" />

    @if (errorMessage()) {
      <p appText variant="body-sm" color="error">{{ errorMessage() }}</p>
    }
  </div>

  <div footer class="flex w-full gap-3">
    <app-custom-button label="Annulla" variant="ghost" [fullWidth]="true" (clicked)="onCancel()" />
    <app-custom-button
      label="Salva"
      [icon]="iconSave"
      variant="primary"
      [fullWidth]="true"
      (clicked)="onSave()" />
  </div>
</app-custom-modal>
