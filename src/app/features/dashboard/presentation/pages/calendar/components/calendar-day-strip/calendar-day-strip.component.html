<div class="flex items-center gap-1 px-1 py-2">
  <app-custom-button
    [icon]="iconPrevious"
    [iconOnly]="true"
    ariaLabel="Settimana precedente"
    variant="ghost"
    size="md"
    rounded="full"
    (clicked)="goToPreviousWeek()" />

  @for (day of days(); track day.date.getTime()) {
    <div class="flex-1">
      <app-custom-card
        [variant]="day.isSelected ? 'info' : 'default'"
        padding="sm"
        shadow="none"
        radius="lg"
        [bordered]="false"
        [clickable]="true"
        (cardClick)="onSelect(day.date)">
        <div class="flex h-20 flex-col items-center gap-1.5 pt-1">
          <p appText variant="caption" [color]="day.weekdayColor" weight="bold">
            {{ day.weekdayLabel }}
          </p>
          <p appText variant="body" [color]="day.dayNumberColor" weight="extrabold">
            {{ day.date.getDate() }}
          </p>
          <span
            class="h-1.5 w-1.5 rounded-full"
            [class.bg-red-500]="day.dotVariant === 'error'"
            [class.bg-purple-500]="day.dotVariant === 'secondary'"
            [class.bg-amber-500]="day.dotVariant === 'warning'"
            [class.bg-transparent]="!day.dotVariant"></span>
          <span
            class="mt-auto block h-0.5 w-4/5 rounded-full"
            [class.bg-red-500]="day.isToday"
            [class.bg-transparent]="!day.isToday"></span>
        </div>
      </app-custom-card>
    </div>
  }

  <app-custom-button
    [icon]="iconNext"
    [iconOnly]="true"
    ariaLabel="Settimana successiva"
    variant="ghost"
    size="md"
    rounded="full"
    (clicked)="goToNextWeek()" />
</div>
