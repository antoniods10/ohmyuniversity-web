<div class="flex items-center justify-between">
  <app-custom-button
    [icon]="iconPrevious"
    [iconOnly]="true"
    ariaLabel="Mese precedente"
    variant="ghost"
    size="md"
    rounded="full"
    (clicked)="goToPreviousMonth()" />

  <p appText variant="h5" weight="extrabold" class="uppercase">{{ monthLabel() }}</p>

  <app-custom-button
    [icon]="iconNext"
    [iconOnly]="true"
    ariaLabel="Mese successivo"
    variant="ghost"
    size="md"
    rounded="full"
    (clicked)="goToNextMonth()" />
</div>

<div class="mt-4 grid grid-cols-7 gap-0 text-center">
  @for (label of weekdayLabels; track label) {
    <p appText variant="caption" color="subtle" weight="bold">{{ label }}</p>
  }
</div>

<div class="mt-2 grid grid-cols-7 gap-0">
  @for (cell of cells(); track cell.date.getTime()) {
    <app-custom-card
      [variant]="cell.isToday ? 'info' : 'default'"
      padding="sm"
      shadow="none"
      radius="sm"
      [bordered]="true"
      [clickable]="true"
      (cardClick)="onDayClick(cell.date)">
      <div class="flex h-24 flex-col gap-1 overflow-hidden">
        <div class="relative inline-block">
          <p
            appText
            variant="h4"
            weight="extrabold"
            [color]="cell.isInMonth ? 'default' : 'subtle'">
            {{ cell.date.getDate() }}
          </p>
          @if (cell.isToday) {
            <svg
              [lucideIcon]="iconToday"
              [size]="14"
              class="absolute -right-3 -top-1 text-red-500"
              aria-hidden="true"></svg>
          }
        </div>

        @for (item of cell.visibleEvents; track $index) {
          <app-custom-badge
            class="block sm:hidden"
            [label]="item.labelMobile"
            [variant]="calendarEventTypeVariant(item.event.type)"
            shape="rounded"
            size="xs" />
          <app-custom-badge
            class="hidden sm:block md:hidden"
            [label]="item.labelTablet"
            [variant]="calendarEventTypeVariant(item.event.type)"
            shape="rounded"
            size="xs" />
          <app-custom-badge
            class="hidden md:block"
            [label]="item.labelDesktop"
            [variant]="calendarEventTypeVariant(item.event.type)"
            shape="rounded"
            size="xs" />
        }

        @if (cell.overflowCount > 0) {
          <p appText variant="caption" color="subtle">+{{ cell.overflowCount }}</p>
        }
      </div>
    </app-custom-card>
  }
</div>
