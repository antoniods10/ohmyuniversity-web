<app-custom-card
  [variant]="variant()"
  padding="none"
  shadow="sm"
  radius="lg"
  [bordered]="false"
  [clickable]="true"
  (cardClick)="onCardClick()">
  <div
    class="flex h-full items-center gap-3"
    [class.px-3]="compact()"
    [class.py-2]="compact()"
    [class.px-4]="!compact()"
    [class.py-3]="!compact()">
    <svg
      [lucideIcon]="icon()"
      [size]="compact() ? 16 : 18"
      [class]="'shrink-0 ' + titleColorClass()"
      aria-hidden="true"></svg>

    <div class="min-w-0 flex-1">
      <p
        appText
        variant="body-sm"
        weight="semibold"
        [truncate]="true"
        [extraClass]="titleColorClass()">
        {{ event().title }}
      </p>
      <p appText variant="caption" color="subtle" [truncate]="true">
        {{ timeRange() }}
      </p>
    </div>

    @if (durationLabel()) {
      <app-custom-badge [label]="durationLabel()" [variant]="variant()" shape="pill" size="sm" />
    }
  </div>
</app-custom-card>
