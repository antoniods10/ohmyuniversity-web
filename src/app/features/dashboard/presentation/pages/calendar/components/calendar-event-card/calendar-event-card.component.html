<app-custom-card
  [variant]="variant()"
  padding="none"
  shadow="sm"
  radius="lg"
  [bordered]="false"
  [clickable]="true"
  (cardClick)="onCardClick()">
  <div
    class="flex h-full items-center gap-3"
    [class.px-3]="compact()"
    [class.py-2]="compact()"
    [class.px-4]="!compact()"
    [class.py-3]="!compact()">
    <svg
      [lucideIcon]="icon()"
      [size]="compact() ? 16 : 18"
      [class]="'shrink-0 ' + titleColorClass()"
      aria-hidden="true"></svg>

    <div class="min-w-0 flex-1">
      <p
        appText
        variant="body-sm"
        weight="semibold"
        [truncate]="true"
        [extraClass]="titleColorClass()">
        {{ event().title }}
      </p>
      <p appText variant="caption" color="subtle" [truncate]="true">
        {{ timeRange() }}
      </p>
      @if (!compact() && event().location) {
        <div class="flex items-center gap-1 mt-0.5">
          <svg
            [lucideIcon]="iconMapPin"
            [size]="11"
            class="shrink-0"
            style="color: var(--color-neutral-400)"
            aria-hidden="true"></svg>
          <p appText variant="caption" color="subtle" [truncate]="true">
            {{ event().location }}
          </p>
        </div>
      }
      @if (!compact() && event().url) {
        <div class="mt-0.5" (click)="$event.stopPropagation()">
          <app-custom-link
            [href]="event().url!"
            [label]="event().url!"
            mode="external"
            size="sm"
            variant="primary" />
        </div>
      }
    </div>

    @if (durationLabel()) {
      <app-custom-badge [label]="durationLabel()" [variant]="variant()" shape="pill" size="sm" />
    }
  </div>
</app-custom-card>
