<app-dashboard-container>
  <app-dashboard-header
    title="Appelli & Questionari"
    description="Prenota i tuoi esami e compila i questionari di valutazione della didattica." />

  <app-custom-tabs
    [tabs]="tabs"
    [activeTab]="activeTab()"
    tabStyle="pill"
    size="md"
    (tabChange)="onTabChange($event)" />

  @if (activeTab() === 'exams') {
    <app-exam-list
      [exams]="exams()"
      [loading]="examsLoading()"
      [error]="examsError()"
      (bookClicked)="onBookExam($event)" />
  }

  @if (activeTab() === 'suggested') {
    <div
      class="flex items-start gap-2 px-3 py-2.5 my-4 rounded-xl"
      style="background: var(--color-info-light)">
      <p appText variant="body-sm" color="muted" class="m-0">
        Gli esami sono ordinati dal più accessibile al più impegnativo, in base all'anno di corso e
        ai CFU. Gli esami con appelli aperti mostrano tutte le informazioni disponibili.
      </p>
    </div>
    <app-exam-list
      [exams]="suggestedExams()"
      [loading]="suggestedLoading()"
      [error]="suggestedError()"
      (bookClicked)="onBookExam($event)" />
  }

  @if (activeTab() === 'questionnaires') {
    <app-questionnaire-list />
  }
</app-dashboard-container>
