<app-custom-modal
  #widgetModal
  type="drawer-bottom"
  [title]="step() === 'list' ? 'Aggiungi widget' : 'Scegli dimensione'"
  [subtitle]="
    step() === 'list'
      ? 'Scegli un widget da aggiungere alla tua dashboard.'
      : (selectedWidget()?.label ?? '')
  ">
  @if (step() === 'list') {
    <div class="flex flex-col gap-6 pt-2">
      @for (section of widgetSections; track section.id) {
        <div class="flex flex-col gap-2">
          <!-- Titolo sezione -->
          <div class="flex items-center gap-2 px-1 pb-1 border-b border-gray-100">
            <svg
              [lucideIcon]="getWidgetIcon(section.widgets[0])"
              [size]="13"
              [style]="'color: var(--color-' + section.id + '-dark)'"></svg>
            <span
              class="text-xs font-bold tracking-widest uppercase"
              [style]="'color: var(--color-' + section.id + '-dark)'">
              {{ section.label }}
            </span>
          </div>

          <!-- Widget della sezione — 2 colonne -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            @for (widget of section.widgets; track widget.id) {
              <button
                class="flex items-center gap-3 p-3 rounded-xl border transition-all text-left"
                [class.opacity-50]="widget.comingSoon"
                [class.cursor-not-allowed]="widget.comingSoon"
                [class.cursor-pointer]="!widget.comingSoon"
                [class.border-primary/30]="isWidgetPlaced(widget.id) && !widget.comingSoon"
                [class.bg-primary/5]="isWidgetPlaced(widget.id) && !widget.comingSoon"
                [class.border-gray-100]="!isWidgetPlaced(widget.id) && !widget.comingSoon"
                [class.bg-gray-50]="!isWidgetPlaced(widget.id)"
                [class.border-gray-200]="widget.comingSoon"
                [class.hover:bg-gray-100]="!widget.comingSoon"
                [disabled]="widget.comingSoon"
                (click)="selectWidget(widget)">
                <!-- Icona -->
                <div
                  class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                  [style]="'background: var(--color-' + widget.color + '-light)'">
                  <svg
                    [lucideIcon]="getWidgetIcon(widget)"
                    [size]="16"
                    [style]="'color: var(--color-' + widget.color + '-dark)'"></svg>
                </div>

                <!-- Label + descrizione -->
                <div class="flex flex-col gap-0.5 flex-1 min-w-0">
                  <span class="text-xs font-semibold text-gray-900 truncate">{{
                    widget.label
                  }}</span>
                  <span class="text-[10px] text-gray-400 truncate">{{ widget.description }}</span>
                </div>

                <!-- Badge stato -->
                @if (widget.comingSoon) {
                  <app-custom-badge label="In arrivo" variant="info" size="sm" />
                } @else if (isWidgetPlaced(widget.id)) {
                  <app-custom-badge label="Attivo" variant="success" size="sm" />
                }
              </button>
            }
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="flex flex-col gap-4 pt-2">
      <!-- Back -->
      <button
        class="flex items-center gap-1.5 text-xs text-gray-500 hover:text-gray-700 transition-colors w-fit"
        (click)="goBack()">
        <svg [lucideIcon]="lucideArrowLeft" [size]="14"></svg>
        Torna alla lista
      </button>

      <!-- Opzioni dimensione — riga su desktop, colonna su mobile -->
      <div class="flex flex-col sm:flex-row gap-3">
        @for (size of availableSizes; track size) {
          <button
            class="flex items-center gap-3 p-4 rounded-2xl border-2 transition-all text-left flex-1"
            [class.border-primary]="selectedSize() === size && !isSizeDisabled(size)"
            [class.bg-primary/5]="selectedSize() === size && !isSizeDisabled(size)"
            [class.border-gray-200]="isSizeDisabled(size)"
            [class.bg-gray-50]="isSizeDisabled(size)"
            [class.opacity-50]="isSizeDisabled(size)"
            [class.cursor-not-allowed]="isSizeDisabled(size)"
            [class.border-gray-100]="selectedSize() !== size && !isSizeDisabled(size)"
            [class.bg-white]="selectedSize() !== size && !isSizeDisabled(size)"
            [disabled]="isSizeDisabled(size)"
            (click)="selectSize(size)">
            <!-- Preview griglia -->
            <div
              class="shrink-0 w-10 h-10 rounded-xl flex items-center justify-center"
              [style]="
                'background: var(--color-' + (selectedWidget()?.color ?? 'primary') + '-light)'
              ">
              @switch (size) {
                @case ('small') {
                  <svg
                    [lucideIcon]="lucideSmall"
                    [size]="20"
                    [style]="
                      'color: var(--color-' + (selectedWidget()?.color ?? 'primary') + '-dark)'
                    "></svg>
                }
                @case ('medium') {
                  <svg
                    [lucideIcon]="lucideMedium"
                    [size]="20"
                    [style]="
                      'color: var(--color-' + (selectedWidget()?.color ?? 'primary') + '-dark)'
                    "></svg>
                }
                @case ('large') {
                  <svg
                    [lucideIcon]="lucideLarge"
                    [size]="20"
                    [style]="
                      'color: var(--color-' + (selectedWidget()?.color ?? 'primary') + '-dark)'
                    "></svg>
                }
              }
            </div>

            <!-- Label -->
            <div class="flex flex-col gap-0.5">
              <span class="text-sm font-semibold text-gray-900">{{
                getSizeConfig(size).label
              }}</span>
              <span class="text-xs text-gray-500">
                {{ isSizeDisabled(size) ? 'Dimensione attuale' : getSizeConfig(size).description }}
              </span>
            </div>

            @if (selectedSize() === size && !isSizeDisabled(size)) {
              <div
                class="ml-auto w-5 h-5 rounded-full bg-primary flex items-center justify-center shrink-0">
                <svg viewBox="0 0 12 12" fill="none" class="w-3 h-3">
                  <path
                    d="M2 6l3 3 5-5"
                    stroke="white"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </div>
            }
          </button>
        }
      </div>

      <app-custom-button
        label="Conferma"
        variant="primary"
        [fullWidth]="true"
        (clicked)="confirm()" />
    </div>
  }
</app-custom-modal>
