<app-custom-modal
  #widgetModal
  type="drawer-bottom"
  [title]="step() === 'list' ? 'Aggiungi widget' : 'Scegli dimensione'"
  [subtitle]="
    step() === 'list'
      ? 'Scegli un widget da aggiungere alla tua dashboard.'
      : (selectedWidget()?.label ?? '')
  ">
  @if (step() === 'list') {
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
      @for (widget of availableWidgets; track widget.id) {
        <button
          class="flex items-start gap-3 p-4 rounded-xl border transition-all text-left"
          [class.border-primary/30]="isWidgetPlaced(widget.id)"
          [class.bg-primary/5]="isWidgetPlaced(widget.id)"
          [class.border-gray-100]="!isWidgetPlaced(widget.id)"
          [class.bg-gray-50]="!isWidgetPlaced(widget.id)"
          (click)="selectWidget(widget)">
          <div
            class="w-10 h-10 rounded-lg bg-white border border-gray-100 shadow-sm flex items-center justify-center shrink-0">
            <svg
              [lucideIcon]="getWidgetIcon(widget.id)"
              [size]="20"
              [class.text-primary]="isWidgetPlaced(widget.id)"
              [class.text-gray-500]="!isWidgetPlaced(widget.id)"></svg>
          </div>
          <div class="flex flex-col gap-0.5 flex-1">
            <span class="text-sm font-medium text-gray-900">{{ widget.label }}</span>
            <span class="text-xs text-gray-500">{{ widget.description }}</span>
          </div>
          @if (isWidgetPlaced(widget.id)) {
            <span class="text-xs text-primary font-medium shrink-0 self-center">Attivo</span>
          }
        </button>
      }
    </div>
  } @else {
    <div class="flex flex-col gap-4 pt-2">
      <button
        class="flex items-center gap-1.5 text-xs text-gray-500 hover:text-gray-700 transition-colors w-fit"
        (click)="goBack()">
        <svg [lucideIcon]="lucideArrowLeft" [size]="14"></svg>
        Torna alla lista
      </button>

      @for (size of availableSizes; track size) {
        <button
          class="flex items-center gap-4 p-4 rounded-2xl border-2 transition-all text-left"
          [class.border-primary]="selectedSize() === size && !isSizeDisabled(size)"
          [class.bg-primary/5]="selectedSize() === size && !isSizeDisabled(size)"
          [class.border-gray-200]="isSizeDisabled(size)"
          [class.bg-gray-50]="isSizeDisabled(size)"
          [class.opacity-50]="isSizeDisabled(size)"
          [class.cursor-not-allowed]="isSizeDisabled(size)"
          [class.border-gray-100]="selectedSize() !== size && !isSizeDisabled(size)"
          [class.bg-white]="selectedSize() !== size && !isSizeDisabled(size)"
          [disabled]="isSizeDisabled(size)"
          (click)="selectSize(size)">
          <div
            class="grid gap-1 shrink-0"
            [style.grid-template-columns]="'repeat(' + GRID_COLS + ', 16px)'">
            @for (cell of gridCells; track cell.row + '-' + cell.col) {
              <div
                class="w-4 h-4 rounded-sm transition-all"
                [class.bg-primary]="
                  isPreviewCell(size, cell.row, cell.col) &&
                  selectedSize() === size &&
                  !isSizeDisabled(size)
                "
                [class.bg-primary/30]="
                  isPreviewCell(size, cell.row, cell.col) &&
                  selectedSize() !== size &&
                  !isSizeDisabled(size)
                "
                [class.bg-gray-200]="
                  isPreviewCell(size, cell.row, cell.col) && isSizeDisabled(size)
                "
                [class.bg-gray-100]="!isPreviewCell(size, cell.row, cell.col)"></div>
            }
          </div>

          <div class="flex flex-col gap-0.5">
            <span class="text-sm font-semibold text-gray-900">{{ getSizeConfig(size).label }}</span>
            <span class="text-xs text-gray-500">
              {{ isSizeDisabled(size) ? 'Dimensione attuale' : getSizeConfig(size).description }}
            </span>
          </div>

          @if (selectedSize() === size && !isSizeDisabled(size)) {
            <div
              class="ml-auto w-5 h-5 rounded-full bg-primary flex items-center justify-center shrink-0">
              <svg viewBox="0 0 12 12" fill="none" class="w-3 h-3">
                <path
                  d="M2 6l3 3 5-5"
                  stroke="white"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
          }
        </button>
      }

      <app-custom-button
        label="Conferma"
        variant="primary"
        [fullWidth]="true"
        (clicked)="confirm()" />
    </div>
  }
</app-custom-modal>
