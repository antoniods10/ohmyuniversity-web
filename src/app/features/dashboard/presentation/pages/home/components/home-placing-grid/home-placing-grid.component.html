<!-- Banner -->
<div
  class="flex items-center justify-between mb-6 px-4 py-3 rounded-xl bg-primary/10 border border-primary/20">
  <div class="flex flex-col gap-0.5">
    <span class="text-sm font-semibold text-primary">Scegli dove posizionare il widget</span>
    <span class="text-xs text-primary/70">Clicca su una zona per piazzarlo.</span>
  </div>
  <button
    class="text-xs px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-gray-500 hover:bg-gray-50 transition-all"
    (click)="cancelled.emit()">
    Annulla
  </button>
</div>

<!-- Griglia -->
<div
  class="grid bg-white rounded-2xl overflow-hidden border border-dashed border-gray-300"
  [style.grid-template-columns]="'repeat(' + GRID_COLS + ', minmax(0, 1fr))'">
  @for (cell of gridCells; track cell.row + '-' + cell.col) {
    <div
      class="h-30 border-dashed border-gray-300 transition-all duration-150 border-r border-b"
      role="button"
      [attr.tabindex]="isCellOccupied(cell.row, cell.col) ? -1 : 0"
      (mouseenter)="hoveredCell.set(cell)"
      (mouseleave)="hoveredCell.set(null)"
      (click)="onCellClick(cell.row, cell.col)"
      (keydown.enter)="onCellClick(cell.row, cell.col)">
      @if (isPreviewCell(cell.row, cell.col)) {
        <div
          class="w-full h-full transition-all duration-150"
          [style.background-color]="
            isPreviewValid() ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)'
          "></div>
      } @else if (isCellOccupied(cell.row, cell.col)) {
        <div class="w-full h-full bg-gray-100/80"></div>
      }
    </div>
  }
</div>
