<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucideGraduation"
  sectionLabel="Carriera"
  widgetLabel="CFU"
  color="career">
  <div class="flex items-center justify-center h-full">
    <div class="flex items-baseline gap-1">
      <p appText variant="h2" weight="bold" color="primary">{{ data.obtainedCfu }}</p>
      <p appText variant="body-sm" color="muted">/ {{ data.totalCfu }}</p>
    </div>
  </div>

  <div footer>
    <app-custom-link
      href="/dashboard/carriera"
      label="Vai alla carriera"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
