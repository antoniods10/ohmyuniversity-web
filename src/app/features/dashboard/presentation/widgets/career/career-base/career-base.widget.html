<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucideChart"
  sectionLabel="Carriera"
  widgetLabel="Base di Laurea"
  color="career">
  <div class="flex items-center justify-center h-full">
    <div class="flex items-baseline gap-1">
      <p appText variant="h2" weight="bold" color="primary">{{ data.graduationBase }}</p>
      <p appText variant="body-sm" color="muted">/ 110</p>
    </div>
  </div>

  <div footer>
    <app-custom-link
      href="/dashboard/carriera"
      label="Vai alla carriera"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
