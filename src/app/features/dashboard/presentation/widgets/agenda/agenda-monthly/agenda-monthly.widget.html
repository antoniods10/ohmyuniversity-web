<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucideCalendar"
  sectionLabel="Agenda"
  [widgetLabel]="currentMonth"
  color="agenda">
  <div class="flex flex-col h-full gap-2 py-1">
    <!-- Intestazione giorni -->
    <div class="grid grid-cols-7 gap-0.5">
      @for (day of ['L', 'M', 'M', 'G', 'V', 'S', 'D']; track $index) {
        <div class="text-center text-[9px] font-bold text-gray-400 py-0.5">{{ day }}</div>
      }
    </div>

    <!-- Griglia calendario -->
    <div class="grid grid-cols-7 gap-0.5 flex-1">
      @for (offset of [].constructor(calendarData().offset); track $index) {
        <div></div>
      }
      @for (day of [].constructor(calendarData().totalDays); track $index) {
        <div
          class="flex flex-col items-center justify-start pt-0.5 rounded-lg text-[10px] font-medium transition-all h-7"
          [class.text-white]="isToday($index + 1)"
          [class.text-gray-700]="!isToday($index + 1)"
          [style.background]="isToday($index + 1) ? 'var(--color-agenda-dark)' : 'transparent'">
          <span>{{ $index + 1 }}</span>
          @if (hasEvent($index + 1)) {
            <div
              class="w-1 h-1 rounded-full mt-0.5"
              [style.background]="isToday($index + 1) ? 'white' : 'var(--color-agenda-dark)'"></div>
          }
        </div>
      }
    </div>
  </div>

  <div footer class="px-3 pb-2">
    <app-custom-link
      href="/dashboard/agenda"
      [label]="'Vai all\'agenda di ' + currentMonth"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
