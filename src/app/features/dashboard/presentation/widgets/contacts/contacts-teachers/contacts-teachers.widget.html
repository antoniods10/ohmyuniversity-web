<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucideContact"
  sectionLabel="Contatti"
  widgetLabel="Docenti"
  color="contacts">
  <div class="flex flex-col h-full overflow-y-auto py-1 gap-1">
    @for (teacher of teachers; track teacher.email) {
      <div
        class="flex flex-col gap-0.5 p-2 rounded-xl hover:bg-white/60 transition-all border-b border-gray-100 last:border-0">
        <p appText variant="caption" weight="semibold" class="truncate">{{ teacher.name }}</p>
        <p appText variant="caption" color="muted" class="truncate">{{ teacher.subject }}</p>
        <a
          [href]="'mailto:' + teacher.email"
          class="text-[10px] no-underline truncate"
          style="color: var(--color-contacts-dark)">
          {{ teacher.email }}
        </a>
      </div>
    }
  </div>

  <div footer class="px-3 pb-2">
    <app-custom-link
      href="/dashboard/contatti-universitari"
      label="Vai ai contatti"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
