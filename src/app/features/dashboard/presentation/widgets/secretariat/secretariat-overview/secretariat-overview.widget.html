<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucidePrinter"
  sectionLabel="Segreteria"
  widgetLabel="Panoramica"
  color="secretariat">
  <div class="flex flex-col h-full justify-between py-1">
    <div class="flex flex-col gap-2">
      <app-custom-badge [label]="resource.type" variant="info" size="sm" />
      <p appText variant="body-sm" weight="semibold">{{ resource.title }}</p>
      <p appText variant="caption" color="muted">{{ resource.description }}</p>
    </div>
  </div>

  <div footer class="px-3 pb-2">
    <app-custom-link [href]="resource.url" label="Vai alla risorsa" mode="external" size="sm" />
  </div>
</app-dashboard-widget-card>
