<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucidePrinter"
  sectionLabel="Segreteria"
  widgetLabel="Modulistica"
  color="secretariat">
  <div class="flex flex-col h-full overflow-y-auto py-1 gap-1">
    @for (form of forms; track form.title) {
      <a
        [href]="form.url"
        target="_blank"
        rel="noopener noreferrer"
        class="flex flex-col gap-0.5 p-2 rounded-xl hover:bg-white/60 transition-all border-b border-gray-100 last:border-0 no-underline">
        <p appText variant="caption" weight="semibold" style="color: var(--color-secretariat-dark)">
          {{ form.title }}
        </p>
        <p appText variant="caption" color="muted" class="truncate">{{ form.description }}</p>
      </a>
    }
  </div>

  <div footer class="px-3 pb-2">
    <app-custom-link
      href="/dashboard/segreteria"
      label="Vai alla segreteria"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
