<app-dashboard-widget-card
  [size]="size"
  [sectionIcon]="lucidePrinter"
  sectionLabel="Segreteria"
  widgetLabel="Borse di Studio"
  color="secretariat">
  <div class="flex flex-col h-full overflow-y-auto py-1 gap-1">
    @for (grant of grants; track grant.title) {
      <div
        class="flex flex-col gap-1 p-2 rounded-xl hover:bg-white/60 transition-all border-b border-gray-100 last:border-0">
        <div class="flex items-center justify-between gap-2">
          <p appText variant="caption" weight="semibold" class="truncate flex-1">
            {{ grant.title }}
          </p>
          <app-custom-badge [label]="grant.amount" variant="success" size="sm" />
        </div>
        <p appText variant="caption" color="muted" class="truncate">{{ grant.description }}</p>
        <p appText variant="caption" color="muted" class="text-[10px]">
          Scadenza: {{ grant.deadline }}
        </p>
      </div>
    }
  </div>

  <div footer class="px-3 pb-2">
    <app-custom-link
      href="/dashboard/segreteria"
      label="Vai alla segreteria"
      mode="internal"
      size="sm" />
  </div>
</app-dashboard-widget-card>
