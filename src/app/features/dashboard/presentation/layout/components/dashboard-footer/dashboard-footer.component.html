<footer
  class="fixed bottom-0 left-0 right-0 h-8 flex items-center justify-center gap-1.5 cursor-pointer select-none z-40 transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2"
  style="
    background: var(--color-neutral-100);
    border-top: 1px solid var(--color-neutral-200);
    color: var(--color-neutral-400);
    font-size: 0.72rem;
    font-family: var(--font-body);
  "
  tabindex="-1"
  role="contentinfo"
  aria-label="Apri footer completo"
  (click)="openDrawer()"
  (keydown.enter)="openDrawer()"
  (keydown.space)="openDrawer()"
  (mouseenter)="hovered = true"
  (mouseleave)="hovered = false"
  [style.color]="hovered ? 'var(--color-neutral-600)' : 'var(--color-neutral-400)'"
  [style.background]="hovered ? 'var(--color-neutral-200)' : 'var(--color-neutral-100)'">
  <span>
    {{ APP.name }} &mdash; another open source project from
    <strong style="color: var(--color-primary-dark)">OhMyOpenSource!</strong>
  </span>
  <svg [lucideIcon]="iconChevronUp" [size]="14" aria-hidden="true"></svg>
</footer>

<!-- Drawer -->
<app-custom-modal
  #footerModal
  type="drawer-bottom"
  [showCloseButton]="true"
  [closeOnBackdrop]="true"
  [closeOnEsc]="true"
  [lockScroll]="false">
  <app-footer [isDashboard]="true" />
</app-custom-modal>
