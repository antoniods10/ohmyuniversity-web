<div class="flex h-[calc(100vh-32px)] overflow-hidden">
  <app-dashboard-sidebar
    [open]="isMobile() ? mobileMenuOpen() : sidebarOpen()"
    [isMobileOpen]="mobileMenuOpen()"
    (toggleSidebar)="onToggleSidebar()"
    (linkClicked)="closeMobileMenu()" />

  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <app-dashboard-topbar (openMobileMenu)="toggleMobileMenu()" />
    <main
      class="flex-1 overflow-y-auto overflow-x-hidden p-6"
      style="background: var(--color-neutral-100)"
      role="main">
      <router-outlet />
    </main>
  </div>
</div>

<!-- Backdrop mobile -->
@if (mobileMenuOpen()) {
  <div class="fixed inset-0 z-40 bg-black/50 lg:hidden" (click)="closeMobileMenu()"></div>
}

<app-dashboard-footer />
