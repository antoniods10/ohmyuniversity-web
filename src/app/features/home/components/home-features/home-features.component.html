<section class="bg-white px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900">Tutto quello che ti serve, subito</h2>
      <p class="mt-4 text-gray-500">
        Progettato da studenti, per studenti. Ogni funzionalità nasce da un problema reale.
      </p>
    </div>

    <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (feature of features; track feature.title) {
        <app-card-simple
          [icon]="feature.icon"
          [variant]="feature.variant ?? 'primary'"
          [title]="feature.title"
          [body]="feature.description"
          shadow="sm"
          [hoverable]="true"
          [stretchHeight]="true" />
      }
    </div>
  </div>
</section>
