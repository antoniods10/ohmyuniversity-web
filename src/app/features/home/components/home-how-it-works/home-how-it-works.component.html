<section class="bg-gray-50 px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900">Come funziona</h2>
      <p class="mt-4 text-gray-500">
        Tre passi e sei operativo. Nessuna configurazione complicata.
      </p>
    </div>

    <div class="mt-14 grid gap-6 sm:grid-cols-3">
      @for (step of steps; track step.number) {
        <app-custom-card
          variant="default"
          padding="lg"
          shadow="sm"
          [bordered]="true"
          [hoverable]="true"
          [stretchHeight]="true">
          <div class="flex h-full flex-col items-center text-center gap-3">
            <div
              class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-blue-600 text-lg font-bold text-white">
              {{ step.number }}
            </div>
            <h3 class="text-base font-bold text-gray-900">{{ step.title }}</h3>
            <p class="text-sm leading-relaxed text-gray-500">{{ step.description }}</p>
          </div>
        </app-custom-card>
      }
    </div>
  </div>
</section>
