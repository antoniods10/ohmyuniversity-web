<section class="bg-blue-600 px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-2xl text-center">
    <h2 class="text-3xl font-bold text-white">Pronto a semplificare la tua vita universitaria?</h2>
    <p class="mt-4 text-blue-100">
      Accedi gratuitamente con le credenziali del tuo ateneo. Nessuna registrazione, nessuna carta
      di credito.
    </p>

    <div class="mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row">
      <!-- CTA primaria — link interno, stile pieno bianco -->
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Accedi ora - è gratis"
          variant="secondary"
          mode="link-internal"
          href="/login"
          size="lg"
          [fullWidth]="true" />
      </div>

      <!-- CTA secondaria — link interno, stile outline -->
      <div class="w-full sm:w-auto">
        <app-custom-button
          label="Scopri chi siamo"
          variant="primary"
          mode="link-internal"
          href="/chi-siamo"
          size="lg"
          [fullWidth]="true" />
      </div>
    </div>
  </div>
</section>
