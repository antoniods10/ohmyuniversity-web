<section class="bg-white px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">
    <!-- Header -->
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900">Cosa dicono gli studenti</h2>
      <p class="mt-4 text-gray-500">Già usato da oltre 120.000 studenti in tutta Italia.</p>
    </div>

    <!-- Grid recensioni -->
    <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 items-stretch">
      @for (review of reviews; track review.name) {
        <app-card-review
          [rating]="review.rating ?? 5"
          [body]="review.text"
          [reviewer]="{
            name: review.name,
            university: review.university,
            avatarSrc: review.avatarSrc ?? '',
          }"
          [verified]="review.verified ?? false"
          [showRatingNumber]="false"
          [stretchHeight]="true"
          [hoverable]="true"
          shadow="sm" />
      }
    </div>
  </div>
</section>
