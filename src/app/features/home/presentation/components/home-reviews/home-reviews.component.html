<section class="bg-white px-4 py-20 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-5xl">
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900">Cosa dicono gli studenti</h2>
      <p class="mt-4 text-gray-500">Già usato da oltre 120.000 studenti in tutta Italia.</p>
    </div>
    <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (review of reviews; track review.name) {
        <div class="rounded-xl border border-gray-100 bg-white p-6 shadow-sm">
          <div class="flex gap-1">
            @for (star of starArray; track star) {
              <svg class="h-4 w-4 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
                <path
                  d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            }
          </div>
          <p class="mt-4 text-sm leading-relaxed text-gray-600">"{{ review.text }}"</p>
          <div class="mt-6 flex items-center gap-3">
            <div
              class="flex h-9 w-9 items-center justify-center rounded-full bg-blue-100 text-xs font-semibold text-blue-700">
              {{ review.initials }}
            </div>
            <div>
              <p class="text-sm font-medium text-gray-900">{{ review.name }}</p>
              <p class="text-xs text-gray-400">{{ review.university }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
