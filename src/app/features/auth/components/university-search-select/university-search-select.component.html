<div class="relative">
  <div class="relative">
    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
      <svg [lucideIcon]="iconSearch" [size]="16" class="text-gray-400"></svg>
    </div>
    <label for="university-search" class="sr-only">Cerca università</label>
    <input
      id="university-search"
      type="text"
      [value]="displayValue"
      (focus)="onFocus()"
      (input)="onInput($any($event.target).value)"
      placeholder="Cerca il tuo ateneo (es. Bologna, Politecnico...)"
      autocomplete="off"
      class="block w-full rounded-lg border border-gray-300 py-2.5 pl-10 pr-4 text-sm text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
  </div>

  @if (isOpen()) {
    <div
      class="absolute z-20 mt-1.5 max-h-64 w-full overflow-y-auto rounded-lg border border-gray-200 bg-white shadow-lg">
      @if (filtered().length === 0) {
        <p class="px-4 py-3 text-center text-sm text-gray-400">Nessun ateneo trovato.</p>
      }
      @for (uni of filtered(); track uni.id) {
        <button
          type="button"
          (click)="selectUniversity(uni)"
          class="flex w-full items-center justify-between px-4 py-2.5 text-left text-sm transition-colors hover:bg-gray-50">
          <span>
            <span class="font-medium text-gray-900">{{ uni.shortName }}</span>
            <span class="ml-2 text-xs text-gray-400">{{ uni.name }}</span>
          </span>
          @if (selected()?.id === uni.id) {
            <svg [lucideIcon]="iconCheck" [size]="16" class="text-blue-500"></svg>
          }
        </button>
      }
    </div>
  }
</div>
