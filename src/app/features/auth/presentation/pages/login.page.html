<div class="grid h-screen overflow-hidden lg:grid-cols-2">
  @if (mode() === 'university') {
    <app-login-marquee [images]="universityImages" [stats]="universityStats" />
  } @else {
    <app-login-marquee [images]="partnerImages" [stats]="partnerStats" />
  }

  <div class="flex items-center justify-center overflow-y-auto bg-white px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
      <div class="mb-8 flex flex-col items-center text-center">
        <img
          [src]="APP.logo"
          [alt]="APP.name"
          class="h-14 w-14 rounded-2xl object-cover shadow-sm" />
        <a routerLink="/" appText class="mt-4 text-2xl font-bold text-gray-900">{{ APP.name }}</a>
        <p appText class="mt-1 text-sm text-gray-500">by {{ ORGANIZATION.name }}</p>
      </div>

      <app-custom-tabs
        [tabs]="modeTabs"
        [activeTab]="mode()"
        tabStyle="pill"
        variant="primary"
        [fullWidth]="true"
        (tabChange)="setMode($event)" />

      <div class="mt-8">
        @if (mode() === 'university') {
          <app-university-login-form />
        } @else {
          <app-partner-login-form />
        }
      </div>

      <p appText class="mt-8 text-center text-xs text-gray-400">
        Accedendo accetti i nostri
        <a routerLink="/termini-condizioni" class="hover:text-gray-600 hover:underline"
          >Termini & Condizioni</a
        >
        e la
        <a routerLink="/privacy-policy" class="hover:text-gray-600 hover:underline"
          >Privacy Policy</a
        >.
      </p>
    </div>
  </div>
</div>
