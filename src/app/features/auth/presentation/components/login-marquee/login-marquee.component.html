<div class="hidden h-screen w-full overflow-hidden bg-white p-3 lg:block">
  <div class="h-full w-full overflow-hidden rounded-3xl bg-gray-900">
    <div class="grid h-full grid-cols-4 gap-3 overflow-hidden p-4">
      @for (column of columns(); track $index) {
        <div class="relative h-full overflow-hidden rounded-2xl">
          <div
            class="flex flex-col gap-3"
            [class.animate-marquee-login-up]="direction($index) === 'up'"
            [class.animate-marquee-login-down]="direction($index) === 'down'"
            [class]="durationClass($index)">
            @for (cell of column; track $index) {
              @if (cell.type === 'image') {
                <div class="shrink-0 overflow-hidden rounded-2xl">
                  <img
                    [src]="cell.data.url"
                    [alt]="cell.data.alt"
                    class="block h-48 w-full object-cover"
                    loading="lazy" />
                </div>
              } @else {
                <div
                  class="flex shrink-0 flex-col gap-1.5 rounded-2xl p-4 text-white shadow-xl"
                  [style.background]="cell.data.bgColor">
                  <span class="text-2xl font-extrabold leading-none">{{ cell.data.value }}</span>
                  <span class="text-xs font-medium leading-snug opacity-90">{{
                    cell.data.label
                  }}</span>
                </div>
              }
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
