<div class="mx-auto mt-12 max-w-4xl grid gap-6 sm:grid-cols-3 items-stretch">
  <app-card-simple
    [icon]="iconShield"
    title="Pagamenti sicuri"
    body="Stripe con crittografia end-to-end. Nessun dato di pagamento sui nostri server."
    variant="success"
    padding="lg"
    shadow="sm"
    [stretchHeight]="true" />

  <app-card-simple
    [icon]="iconRefresh"
    title="Disdetta facile"
    body="Nessun vincolo. Disdici online in autonomia, senza chiamare nessuno."
    variant="info"
    padding="lg"
    shadow="sm"
    [stretchHeight]="true" />

  <app-card-simple
    [icon]="iconMessage"
    title="Supporto reale"
    body="Non chatbot. Rispondiamo noi, persone vere, entro i tempi del tuo piano."
    variant="tertiary"
    padding="lg"
    shadow="sm"
    [stretchHeight]="true" />
</div>
