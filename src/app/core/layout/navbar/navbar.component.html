<nav class="border-b border-gray-200 bg-white" appClickOutside (clickOutside)="closeMobileMenu()">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="inline-flex items-center gap-2 text-gray-900">
          <app-logo size="sm" class="text-blue-600" />
          <span class="text-base font-bold tracking-tight">OhMyUniversity</span>
        </a>
      </div>

      <!-- Link desktop -->
      <div class="hidden sm:flex sm:items-center sm:gap-6">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-blue-600 font-medium"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="text-sm text-gray-600 transition-colors hover:text-gray-900">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Azioni desktop -->
      <div class="hidden sm:flex sm:items-center sm:gap-3">
        <a
          routerLink="/partner"
          class="rounded-md border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-medium text-blue-700 transition hover:bg-blue-100">
          Partner
        </a>
        <a
          routerLink="/login"
          class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
          Accedi
        </a>
      </div>

      <!-- Hamburger mobile -->
      <div class="sm:hidden">
        <button
          type="button"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="isMobileMenuOpen()"
          aria-label="Apri menu di navigazione"
          class="inline-flex items-center justify-center rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500">
          @if (isMobileMenuOpen()) {
            <svg
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Menu mobile -->
  @if (isMobileMenuOpen()) {
    <div class="border-t border-gray-200 sm:hidden">
      <div class="space-y-1 px-4 py-3">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-blue-600 font-medium bg-blue-50"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            (click)="closeMobileMenu()"
            class="block rounded-md px-3 py-2 text-sm text-gray-600 transition hover:bg-gray-50 hover:text-gray-900">
            {{ link.label }}
          </a>
        }
        <div class="my-2 border-t border-gray-100"></div>
        <a
          routerLink="/partner"
          (click)="closeMobileMenu()"
          class="block rounded-md border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-medium text-blue-700">
          Partner
        </a>
        <a
          routerLink="/login"
          (click)="closeMobileMenu()"
          class="block rounded-md bg-blue-600 px-3 py-2 text-center text-sm font-medium text-white hover:bg-blue-700">
          Accedi
        </a>
      </div>
    </div>
  }
</nav>
