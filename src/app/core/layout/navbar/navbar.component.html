<nav class="border-b border-gray-200 bg-white">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <!-- Logo -->
      <div class="shrink-0">
        <a routerLink="/" class="inline-flex items-center gap-2 text-gray-900">
          <img [src]="APP_LOGO" [alt]="APP_NAME" class="h-8 w-8" />
          <span appText class="text-base font-bold tracking-tight">{{ APP_NAME }}</span>
        </a>
      </div>

      <!-- Desktop -->
      <div class="hidden sm:flex sm:items-center sm:gap-6 sm:h-16">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            #rla="routerLinkActive"
            routerLinkActive
            [ngClass]="[
              'flex h-full items-center border-b-2 text-sm font-semibold transition-colors',
              rla.isActive ? 'border-blue-600' : 'border-transparent',
              link.accent
                ? 'text-violet-600 hover:text-violet-700'
                : 'text-gray-700 hover:text-gray-900',
            ]">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Login -->
      <div class="hidden sm:flex sm:items-center sm:gap-3">
        <app-custom-button
          label="Accedi"
          mode="link-internal"
          href="/login"
          variant="primary"
          size="sm" />
      </div>

      <!-- Hamburger mobile -->
      <div class="sm:hidden">
        <app-custom-button
          variant="ghost"
          size="sm"
          [iconOnly]="true"
          [icon]="iconMenu"
          ariaLabel="Apri menu di navigazione"
          (clicked)="mobileMenu.open()" />
      </div>
    </div>
  </div>
</nav>

<!-- Mobile -->
<app-custom-modal #mobileMenu type="drawer-right" [drawerSize]="300" title="Menu">
  <div class="flex flex-col gap-1">
    @for (link of navLinks; track link.path) {
      <a
        [routerLink]="link.path"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        #rlaMobile="routerLinkActive"
        routerLinkActive
        (click)="mobileMenu.close('programmatic')"
        [ngClass]="[
          'rounded-md px-3 py-2.5 text-sm font-semibold transition',
          rlaMobile.isActive ? 'bg-blue-50' : '',
          link.accent ? 'text-violet-600 hover:bg-violet-50' : 'text-gray-700 hover:bg-gray-50',
        ]">
        {{ link.label }}
      </a>
    }
    <div class="my-2 border-t border-gray-100"></div>
    <app-custom-button
      label="Accedi"
      mode="link-internal"
      href="/login"
      variant="primary"
      size="md"
      [fullWidth]="true"
      (clicked)="mobileMenu.close('programmatic')" />
  </div>
</app-custom-modal>
