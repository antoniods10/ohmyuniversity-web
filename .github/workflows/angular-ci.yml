name: Angular CI

on:
  pull_request:
    branches:
      - dev

  push:
    branches:
      - dev
      - staging
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      - name: Run Unit Tests
        run: pnpm vitest run

      - name: Build Angular application
        run: pnpm build
