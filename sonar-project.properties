sonar.projectKey=ohmyopensource_ohmyuniversity-web
sonar.organization=ohmyopensource
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Sources
sonar.sources=src
sonar.tests=src

# Inclusions
sonar.test.inclusions=**/*.spec.ts

# Exclusions
sonar.exclusions=**/*.spec.ts,src/main.ts,src/environments/**

# Coverage exclusions
sonar.coverage.exclusions=\
  src/main.ts,\
  src/environments/**,\
  src/app/shared/data/mock/**,\
  src/app/shared/constants/**

# Duplicate detection exclusions
sonar.cpd.exclusions=\
  src/app/shared/data/mock/**,\
  src/app/shared/constants/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
